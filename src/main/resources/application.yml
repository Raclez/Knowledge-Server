spring:
  application:
    name: knowledge-server

  main:
    web-application-type: servlet

knowledge-server:
  index:
    path: "./index"
    watch-paths:
      - "./docs"
    supported-extensions:
      - ".pdf"
      - ".doc"
      - ".docx"
      - ".xls"
      - ".xlsx"
      - ".txt"
      - ".md"
      - ".html"
    max-file-size: 104857600
    batch-size: 100

  watcher:
    debounce-ms: 500
    recursive: true

  search:
    max-results: 100
    highlight-fragments: 3

logging:
  level:
    com.knowledge.server: DEBUG
