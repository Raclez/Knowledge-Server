spring:
  application:
    name: knowledge-server

  ai:
    mcp:
      server:
        enabled: true
        stdio: false



  main:
    web-application-type: servlet
#    banner-mode: "off"
#    log-startup-info: false



knowledge-server:
  index:
    path: "./index"
    watch-paths:
      - "./docs"
    supported-extensions:
      - ".pdf"
      - ".doc"
      - ".docx"
      - ".xls"
      - ".xlsx"
      - ".txt"
      - ".md"
      - ".html"
    max-file-size: 104857600
    batch-size: 100

  watcher:
    debounce-ms: 500
    recursive: true

  search:
    max-results: 100
    highlight-fragments: 3

#logging:
#  appender:
#    console:
#      target: System.err


#  level:
#      org.springframework.ai.mcp.server: WARN


logging:
  level:
    # 强制让 Spring 打印出所有它注册的 URL 映射
    org.springframework.web.servlet.handler.BeanNameUrlHandlerMapping: DEBUG
    org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping: DEBUG
    org.springframework.ai.mcp.server: DEBUG
    com.knowledge.server.mcp: DEBUG